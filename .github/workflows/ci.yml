name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-build-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Keep in sync with mise.toml (used for local runs).
          version: v2.12.2
          # Only report issues introduced by the current change; existing
          # findings are grandfathered until they are addressed separately.
          only-new-issues: true

      - name: Build check
        run: go build -o /dev/null main.go

      - name: Test
        run: go test ./...
